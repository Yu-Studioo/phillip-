<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request a Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #0f172a;
  color: #f9fafb;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* FORM BOX */
.container {
  background: #1f2937;
  padding: 30px;
  border-radius: 10px;
  width: 400px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* TITLE */
h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #111827;
  border: 1px solid #374151;
  color: white;
  border-radius: 5px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #16a34a;
}

/* SUCCESS */
.success {
  text-align: center;
  margin-top: 15px;
  color: #22c55e;
}
</style>
</head>

<body>

<div class="container">
  <h1>Request a Game 🎮</h1>

  <!-- 🔥 FORM -->
  <form action="https://formspree.io/f/mpqolzbz" method="POST">

    <input type="text" name="name" placeholder="Your name (optional)">

    <input type="text" name="game" placeholder="Game name" required>

    <input type="text" name="link" placeholder="Game link (if you have one)">

    <textarea name="message" placeholder="Extra details..."></textarea>

    <button type="submit">Submit Request</button>
  </form>

</div>

</body>
</html>
