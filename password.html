<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Access Terminal</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

/* Matrix background */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* Terminal box */
.terminal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border: 2px solid #00ff00;
  padding: 20px;
  width: 400px;
  background: rgba(0, 0, 0, 0.8);
}

/* Text */
.line {
  margin: 5px 0;
}

/* Input */
input {
  background: black;
  border: none;
  border-bottom: 1px solid #00ff00;
  color: #00ff00;
  width: 100%;
  outline: none;
  font-family: monospace;
}

/* Progress bar */
.progress {
  margin-top: 15px;
  height: 10px;
  border: 1px solid #00ff00;
}

.bar {
  height: 100%;
  width: 0%;
  background: #00ff00;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="terminal">
  <div class="line" id="typing"></div>

  <input type="password" id="password" placeholder="ENTER PASSWORD..." />

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="line" id="status"></div>
</div>

<script>
// ===== MATRIX BACKGROUND =====
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(drawMatrix, 33);

// ===== TYPING EFFECT =====
const text = "INITIALIZING ACCESS...";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();

// ===== PASSWORD LOGIC =====
const input = document.getElementById("password");
const bar = document.getElementById("bar");
const status = document.getElementById("status");

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    startHack();
  }
});

function startHack() {
  status.innerHTML = "ACCESSING SYSTEM...";
  let width = 0;

  const interval = setInterval(() => {
    width += 2;
    bar.style.width = width + "%";

    if (width >= 100) {
      clearInterval(interval);

      if (input.value === "1234") {
  status.innerHTML = "ACCESS GRANTED";

  setTimeout(() => {
    window.location.href = "games.html";
  }, 1000); // delay so user sees the message
}else {
        status.innerHTML = "ACCESS DENIED";
        bar.style.width = "0%";
      }
    }
  }, 30);
}
</script>

</body>
</html>
